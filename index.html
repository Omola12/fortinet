<!DOCTYPE html>
<html>
<head>
    <title>Fortinet Support - Submit Complaint</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial; background: linear-gradient(135deg, #0a5c4a 0%, #1a3a2e 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .header h1 span { color: #ffd700; }
        .fortinet-logo .logo { font-size: 48px; background: #0a5c4a; color: white; width: 80px; height: 80px; line-height: 80px; border-radius: 50%; margin: 0 auto 15px; display: inline-block; }
        .form-card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #333; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; }
        button { background: linear-gradient(135deg, #0a5c4a 0%, #1a3a2e 100%); color: white; padding: 14px; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; }
        .track-section { margin-top: 30px; padding-top: 30px; border-top: 2px solid #eee; }
        .track-input { display: flex; gap: 10px; margin-top: 15px; }
        .track-input input { flex: 1; }
        .track-input button { width: auto; padding: 12px 20px; }
        .success { background: #d4edda; color: #155724; padding: 12px; border-radius: 8px; margin-bottom: 20px; }
        .error { background: #f8d7da; color: #721c24; padding: 12px; border-radius: 8px; margin-bottom: 20px; }
        .complaint-status { background: #f8f9fa; border-radius: 10px; padding: 15px; margin-top: 15px; }
        .reply-box { background: #e3f2fd; padding: 15px; border-radius: 10px; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="fortinet-logo"><div class="logo">F</div></div>
        <h1><span>FORTINET</span> Support</h1>
        <p>Customer Complaint Portal</p>
    </div>

    <div class="form-card">
        <div id="message"></div>
        <form id="complaintForm">
            <div class="input-group"><label>Full Name *</label><input type="text" id="customerName" required></div>
            <div class="input-group"><label>Email *</label><input type="email" id="customerEmail" required></div>
            <div class="input-group"><label>Subject *</label><input type="text" id="subject" required></div>
            <div class="input-group">
                <label>Category *</label>
                <select id="category">
                    <option>Technical Issue</option><option>Billing Problem</option>
                    <option>Feature Request</option><option>Account Issue</option><option>Other</option>
                </select>
            </div>
            <div class="input-group"><label>Complaint Details *</label><textarea id="message" rows="4" required></textarea></div>
            <button type="submit">📤 Submit to Fortinet</button>
        </form>

        <div class="track-section">
            <h3>🔍 Track Your Complaint</h3>
            <div class="track-input">
                <input type="text" id="trackingId" placeholder="Enter Complaint ID">
                <button onclick="trackComplaint()">Track</button>
            </div>
            <div id="trackResult"></div>
        </div>
    </div>
</div>

<script>
// ⚙️ REPLACE WITH YOUR ACTUAL WEB APP URL
const API_URL = "https://script.google.com/macros/s/AKfycbyGGso7AUimPYB_DC1rhpqeAySefkPGcI4qxBQVhJk0CVD7IkQEdY8Z5M9rhWgVi-JJ/exec";

async function submitComplaint(data) {
    const response = await fetch(API_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });
    return await response.json();
}

document.getElementById("complaintForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const payload = {
        action: "submit",
        name: document.getElementById("customerName").value,
        email: document.getElementById("customerEmail").value,
        subject: document.getElementById("subject").value,
        category: document.getElementById("category").value,
        message: document.getElementById("message").value
    };
    const result = await submitComplaint(payload);
    if (result.id) {
        document.getElementById("message").innerHTML = `<div class="success">✅ Complaint sent!<br>Your ID: <strong>${result.id}</strong></div>`;
        document.getElementById("complaintForm").reset();
    } else {
        document.getElementById("message").innerHTML = `<div class="error">❌ Error: ${result.error}</div>`;
    }
});

async function trackComplaint() {
    const id = document.getElementById("trackingId").value.trim();
    if (!id) return alert("Enter Complaint ID");
    const res = await fetch(`${API_URL}?action=getOne&id=${encodeURIComponent(id)}`);
    const data = await res.json();
    const trackDiv = document.getElementById("trackResult");
    if (data.complaint) {
        const c = data.complaint;
        trackDiv.innerHTML = `<div class="complaint-status">
            <strong>ID:</strong> ${c.ID}<br>
            <strong>Status:</strong> ${c.Status}<br>
            <strong>Reply:</strong> ${c.Reply || "No reply yet"}<br>
            <strong>Date:</strong> ${c.Date}
        </div>`;
    } else {
        trackDiv.innerHTML = `<div class="error">Complaint not found</div>`;
    }
}
</script>
</body>
</html>
